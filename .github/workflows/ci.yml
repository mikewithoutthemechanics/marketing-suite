name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd scheduler-app
          npm ci
      - name: Start server
        run: |
          cd scheduler-app
          npm run start &
          # wait for app to boot
          for i in {1..15}; do
            curl -sS http://localhost:4000/api/models && break || sleep 2
          done
      - name: Run tests (smoke)
        run: |
          cd scheduler-app
          npm test
